<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Is It Peak Claude Hours?</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1220;
        --card: #161a2e;
        --text: #ecf0ff;
        --muted: #b8c0e0;
        --accent: #6ca0ff;
        --peak: #ff6b6b;
        --offpeak: #3ddc97;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #1f2a52 0%, var(--bg) 60%);
        color: var(--text);
      }

      .card {
        width: min(760px, 100%);
        background: color-mix(in oklab, var(--card) 90%, black 10%);
        border: 1px solid #2f3868;
        border-radius: 16px;
        padding: 1.25rem;
        box-shadow: 0 10px 30px rgb(0 0 0 / 0.35);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.4rem, 2.5vw, 2rem);
      }

      .status {
        margin: 0.25rem 0 0.75rem;
        font-size: clamp(1.15rem, 2.2vw, 1.5rem);
        font-weight: 700;
      }

      .status.peak { color: var(--peak); }
      .status.offpeak { color: var(--offpeak); }

      .detail {
        color: var(--muted);
        margin: 0.2rem 0;
      }

      .timeline-wrap { margin-top: 1.2rem; }

      .timeline-title {
        margin: 0 0 0.45rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .timeline {
        position: relative;
        height: 56px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #35417a;
        background: linear-gradient(90deg, #1a2140 0%, #11162c 100%);
      }

      .peak-window {
        position: absolute;
        top: 0;
        bottom: 0;
        background: linear-gradient(90deg, rgb(255 107 107 / 0.85), rgb(255 107 107 / 0.6));
      }

      .now-marker {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #fff;
        box-shadow: 0 0 8px #fff;
      }

      .now-dot {
        position: absolute;
        top: 50%;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fff;
        transform: translate(-4px, -50%);
        box-shadow: 0 0 12px #fff;
      }

      .ticks {
        display: flex;
        justify-content: space-between;
        margin-top: 0.4rem;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .foot {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.4;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: rgb(255 255 255 / 0.07);
        padding: 0.15rem 0.32rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Is it peak Claude hours?</h1>
      <p id="status" class="status">Checking…</p>
      <p id="countdown" class="detail"></p>
      <p id="clock" class="detail"></p>

      <section class="timeline-wrap" aria-label="Daily peak window timeline">
        <p class="timeline-title">Today in Pacific Time (PT)</p>
        <div class="timeline" role="img" aria-label="24 hour timeline with peak window and current time marker">
          <div id="peakWindow" class="peak-window"></div>
          <div id="nowMarker" class="now-marker"></div>
          <div id="nowDot" class="now-dot"></div>
        </div>
        <div class="ticks">
          <span>00:00</span>
          <span>05:00 peak starts</span>
          <span>11:00 peak ends</span>
          <span>24:00</span>
        </div>
      </section>

      <p class="foot">
        Based on the posted schedule: weekdays <code>5am–11am PT</code> (also written as <code>1pm–7pm GMT</code>).<br />
        Countdown is computed using Pacific time weekdays.
      </p>
    </main>

    <script>
      const PT_ZONE = 'America/Los_Angeles';
      const PEAK_START_HOUR = 5;
      const PEAK_END_HOUR = 11;
      const MS_IN_HOUR = 3600 * 1000;
      const MS_IN_DAY = 24 * MS_IN_HOUR;

      const statusEl = document.getElementById('status');
      const countdownEl = document.getElementById('countdown');
      const clockEl = document.getElementById('clock');
      const peakWindowEl = document.getElementById('peakWindow');
      const nowMarkerEl = document.getElementById('nowMarker');
      const nowDotEl = document.getElementById('nowDot');

      const dtf = new Intl.DateTimeFormat('en-US', {
        timeZone: PT_ZONE,
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });

      function getPTParts(date = new Date()) {
        const parts = dtf.formatToParts(date);
        const map = Object.fromEntries(parts.map((p) => [p.type, p.value]));
        return {
          weekday: map.weekday,
          year: Number(map.year),
          month: map.month,
          day: Number(map.day),
          hour: Number(map.hour),
          minute: Number(map.minute),
          second: Number(map.second),
          label: dtf.format(date),
        };
      }

      function isPTWeekday(weekdayShort) {
        return !['Sat', 'Sun'].includes(weekdayShort);
      }

      function formatDuration(ms) {
        const totalSec = Math.max(0, Math.floor(ms / 1000));
        const hours = Math.floor(totalSec / 3600);
        const minutes = Math.floor((totalSec % 3600) / 60);
        const seconds = totalSec % 60;
        return `${hours}h ${minutes}m ${seconds}s`;
      }

      function msUntilWeekdayPeakStart(parts) {
        const nowMinutes = parts.hour * 60 + parts.minute + parts.second / 60;
        const startMinutes = PEAK_START_HOUR * 60;

        if (isPTWeekday(parts.weekday) && nowMinutes < startMinutes) {
          return (startMinutes - nowMinutes) * 60 * 1000;
        }

        const weekdayIndex = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].indexOf(parts.weekday);
        let daysToAdd = 1;
        while (daysToAdd <= 7) {
          const next = (weekdayIndex + daysToAdd) % 7;
          if (![0, 6].includes(next)) break;
          daysToAdd += 1;
        }

        const remainingToday = MS_IN_DAY - ((parts.hour * 3600 + parts.minute * 60 + parts.second) * 1000);
        return remainingToday + (daysToAdd - 1) * MS_IN_DAY + PEAK_START_HOUR * MS_IN_HOUR;
      }

      function update() {
        const now = new Date();
        const pt = getPTParts(now);
        const weekday = isPTWeekday(pt.weekday);
        const nowHourFraction = pt.hour + pt.minute / 60 + pt.second / 3600;

        const inPeak = weekday && nowHourFraction >= PEAK_START_HOUR && nowHourFraction < PEAK_END_HOUR;
        const msToBoundary = inPeak
          ? (PEAK_END_HOUR - nowHourFraction) * MS_IN_HOUR
          : msUntilWeekdayPeakStart(pt);

        statusEl.textContent = inPeak ? 'Yes — it is PEAK Claude hours.' : 'No — it is OFF-PEAK Claude hours.';
        statusEl.className = `status ${inPeak ? 'peak' : 'offpeak'}`;

        countdownEl.textContent = inPeak
          ? `Time remaining in peak window: ${formatDuration(msToBoundary)}`
          : `Time until next peak window: ${formatDuration(msToBoundary)}`;

        const userZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        clockEl.textContent = `Now: ${now.toLocaleString()} (${userZone}) | PT: ${pt.label} (${PT_ZONE})`;

        peakWindowEl.style.left = `${(PEAK_START_HOUR / 24) * 100}%`;
        peakWindowEl.style.width = `${((PEAK_END_HOUR - PEAK_START_HOUR) / 24) * 100}%`;

        const markerLeftPercent = (nowHourFraction / 24) * 100;
        nowMarkerEl.style.left = `${markerLeftPercent}%`;
        nowDotEl.style.left = `${markerLeftPercent}%`;
      }

      update();
      setInterval(update, 1000);
    </script>
  </body>
</html>
